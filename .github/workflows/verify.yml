name: verify
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check-types
      - run: npm run lint
      # tsc never deletes stale outputs; a stale out/ would run ghost tests
      - run: node -e "fs.rmSync('out',{recursive:true,force:true})"
      - run: npm test
        if: runner.os != 'Linux'
      - run: xvfb-run -a npm test
        if: runner.os == 'Linux'
